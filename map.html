<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>徐州周边优惠地图 · Mogu AI</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif; background: #f5f6fa; color: #222; }
    #header { background: linear-gradient(135deg, #1677ff, #0958d9); color: #fff; padding: 14px 16px 12px; }
    #header h1 { font-size: 18px; font-weight: 600; }
    #header p { font-size: 12px; opacity: 0.9; margin-top: 4px; }
    #status { padding: 10px 16px; font-size: 13px; background: #fff; border-bottom: 1px solid #eee; }
    #map { width: 100%; height: 52vh; min-height: 280px; background: #e8ecf1; }
    #list { padding: 12px 16px 24px; }
    #list h2 { font-size: 15px; margin-bottom: 10px; }
    .deal-card { background: #fff; border-radius: 10px; padding: 12px; margin-bottom: 10px; box-shadow: 0 1px 4px rgba(0,0,0,.06); }
    .deal-card .title { font-size: 14px; font-weight: 600; line-height: 1.4; margin-bottom: 6px; }
    .deal-card .meta { font-size: 12px; color: #666; line-height: 1.5; }
    .deal-card .dist { color: #1677ff; font-weight: 600; }
    .deal-card a { color: #1677ff; text-decoration: none; font-size: 13px; }
    .tag { display: inline-block; background: #e6f4ff; color: #1677ff; font-size: 11px; padding: 2px 6px; border-radius: 4px; margin-right: 4px; }
    .empty { text-align: center; color: #999; padding: 32px 16px; font-size: 14px; }
    .error { color: #cf1322; }
  </style>
</head>
<body>
  <div id="header">
    <h1>🗺️ 徐州周边优惠地图</h1>
    <p id="subtitle">正在加载…</p>
  </div>
  <div id="status">正在加载地图…</div>
  <div id="map"></div>
  <div id="list"><h2>附近优惠</h2><div id="deal-list"></div></div>

  <script src="map_config.js"></script>
  <script>
    (function () {
      var cfg = window.MOGU_MAP_CONFIG || {};
      var RADIUS_KM = 15;
      var map, userPos, markers = [];

      function applyRadius(km) {
        RADIUS_KM = km || 15;
        var sub = document.getElementById("subtitle");
        if (sub) sub.textContent = RADIUS_KM + " 公里内超市 · 商场 · 吃喝玩乐优惠";
      }

      function setStatus(msg, isError) {
        var el = document.getElementById("status");
        el.textContent = msg;
        el.className = isError ? "error" : "";
      }

      function escapeHtml(s) {
        return String(s || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
      }

      function haversineKm(lat1, lng1, lat2, lng2) {
        var R = 6371;
        var dLat = (lat2 - lat1) * Math.PI / 180;
        var dLng = (lng2 - lng1) * Math.PI / 180;
        var a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
          Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLng / 2) * Math.sin(dLng / 2);
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
      }

      function renderList(items) {
        var el = document.getElementById("deal-list");
        if (!items.length) {
          el.innerHTML = '<div class="empty">附近 ' + RADIUS_KM + ' 公里内暂无匹配优惠<br/>可扩大范围或稍后再试</div>';
          return;
        }
        items.sort(function (a, b) { return a.distance - b.distance; });
        el.innerHTML = items.map(function (d) {
          return '<div class="deal-card">' +
            '<div class="title">' + escapeHtml(d.title) + '</div>' +
            '<div class="meta"><span class="tag">' + escapeHtml(d.category) + '</span>' +
            '<span class="dist">' + d.distance.toFixed(0) + ' 米</span> · ' + escapeHtml(d.poi_name) + '</div>' +
            (d.link ? '<div style="margin-top:8px"><a href="' + escapeHtml(d.link) + '">查看详情 →</a></div>' : '') +
            '</div>';
        }).join("");
      }

      function clearMarkers() {
        markers.forEach(function (m) { map.remove(m); });
        markers = [];
      }

      function showOnMap(items, center) {
        clearMarkers();
        items.forEach(function (d) {
          var marker = new AMap.Marker({
            position: [d.lng, d.lat],
            title: d.poi_name,
            label: { content: d.distance.toFixed(0) + "m", direction: "top" }
          });
          marker.on("click", function () {
            new AMap.InfoWindow({
              content: '<div style="padding:8px;max-width:220px"><b>' + escapeHtml(d.poi_name) + '</b><br/>' + escapeHtml(d.title) + '<br/><span style="color:#1677ff">' + d.distance.toFixed(0) + '米</span></div>'
            }).open(map, [d.lng, d.lat]);
          });
          map.add(marker);
          markers.push(marker);
        });
        if (center) {
          var circle = new AMap.Circle({
            center: center, radius: RADIUS_KM * 1000,
            strokeColor: "#1677ff", strokeOpacity: 0.6, fillColor: "#1677ff", fillOpacity: 0.08
          });
          map.add(circle);
          markers.push(circle);
        }
        if (items.length) map.setFitView(markers, false, [40, 40, 40, 40]);
      }

      function run(dealsData, pos) {
        userPos = pos;
        var lat = pos[1], lng = pos[0];
        setStatus("您的位置已获取 · 显示 " + RADIUS_KM + " 公里内优惠");
        map = new AMap.Map("map", { zoom: 14, center: pos, viewMode: "2D" });
        new AMap.Marker({
          position: pos, title: "我的位置",
          icon: "https://webapi.amap.com/theme/v1.3/markers/n/loc.png"
        }).setMap(map);

        var nearby = (dealsData.deals || []).map(function (d) {
          var dist = haversineKm(lat, lng, d.lat, d.lng) * 1000;
          return Object.assign({}, d, { distance: dist });
        }).filter(function (d) { return d.distance <= RADIUS_KM * 1000; });

        renderList(nearby);
        showOnMap(nearby, pos);
      }

      function fallbackCenter(dealsData) {
        var c = dealsData.center || { lng: 117.184, lat: 34.261 };
        setStatus("未授权定位 · 以徐州市中心显示（请允许定位查看距离）");
        run(dealsData, [c.lng, c.lat]);
      }

      function startWithDeals(dealsData) {
        setStatus("正在获取您的位置…");
        if (!navigator.geolocation) {
          fallbackCenter(dealsData);
          return;
        }
        navigator.geolocation.getCurrentPosition(
          function (pos) { run(dealsData, [pos.coords.longitude, pos.coords.latitude]); },
          function () { fallbackCenter(dealsData); },
          { enableHighAccuracy: true, timeout: 10000, maximumAge: 60000 }
        );
      }

      function loadAmap(callback) {
        if (window.AMap) {
          callback();
          return;
        }
        if (!cfg.amapKey) {
          setStatus("地图配置错误：缺少高德 Key，请检查 map_config.js", true);
          return;
        }
        window._AMapSecurityConfig = { securityJsCode: cfg.securityJsCode || "" };
        var s = document.createElement("script");
        s.src = "https://webapi.amap.com/maps?v=2.0&key=" + encodeURIComponent(cfg.amapKey);
        s.onload = function () {
          if (window.AMap) callback();
          else setStatus("高德地图 SDK 加载失败", true);
        };
        s.onerror = function () {
          setStatus("高德地图加载失败：请在高德控制台将 ly136148277-netizen.github.io 加入域名白名单", true);
        };
        document.head.appendChild(s);
      }

      fetch("deals_today.json?t=" + Date.now())
        .then(function (r) {
          if (!r.ok) throw new Error("HTTP " + r.status);
          return r.json();
        })
        .then(function (dealsData) {
          applyRadius(dealsData.radius_km);
          loadAmap(function () { startWithDeals(dealsData); });
        })
        .catch(function (err) {
          setStatus("加载优惠数据失败: " + err.message, true);
          document.getElementById("deal-list").innerHTML = '<div class="empty">无法加载 deals_today.json</div>';
        });
    })();
  </script>
</body>
</html>
