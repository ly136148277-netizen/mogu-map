<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <title>徐州周边优惠地图 · Mogu AI</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif; background: #f5f6fa; color: #222; }
    #header { background: linear-gradient(135deg, #1677ff, #0958d9); color: #fff; padding: 14px 16px 12px; }
    #header h1 { font-size: 18px; font-weight: 600; }
    #header p { font-size: 12px; opacity: 0.9; margin-top: 4px; }
    #status { padding: 10px 16px; font-size: 13px; background: #fff; border-bottom: 1px solid #eee; }
    #map { width: 100%; height: 52vh; min-height: 280px; background: #e8ecf1; }
    #list { padding: 12px 16px 24px; }
    #list h2 { font-size: 15px; margin-bottom: 10px; }
    .deal-card { background: #fff; border-radius: 10px; padding: 12px; margin-bottom: 10px; box-shadow: 0 1px 4px rgba(0,0,0,.06); }
    .deal-card .title { font-size: 14px; font-weight: 600; line-height: 1.4; margin-bottom: 6px; }
    .deal-card .meta { font-size: 12px; color: #666; }
    .deal-card .dist { color: #1677ff; font-weight: 600; }
    .deal-card a, .deal-link-copy { color: #1677ff; text-decoration: none; font-size: 13px; background: none; border: none; padding: 0; cursor: pointer; }
    .tag { display: inline-block; background: #e6f4ff; color: #1677ff; font-size: 11px; padding: 2px 6px; border-radius: 4px; margin-right: 4px; }
    .empty { text-align: center; color: #999; padding: 32px 16px; font-size: 14px; }
    .error { color: #cf1322; }
    #toast { display: none; position: fixed; left: 50%; bottom: 72px; transform: translateX(-50%); max-width: 90%; padding: 12px 16px; background: rgba(0,0,0,.85); color: #fff; font-size: 14px; border-radius: 10px; z-index: 9999; }
    #toast.show { display: block; }
  </style>
</head>
<body>
  <div id="header">
    <h1>🛒 徐州周边优惠地图</h1>
    <p id="subtitle">正在加载…</p>
    <p style="font-size:12px;margin-top:6px"><a href="events_map.html" style="color:#fff;opacity:.95">⚠️ 查看周边突发地图 →</a></p>
  </div>
  <div id="status">正在加载地图…</div>
  <div id="map"></div>
  <div id="list"><h2>附近优惠</h2><div id="deal-list"></div></div>
  <div id="toast"></div>
  <script src="map_config.js"></script>
  <script>
    (function () {
      var cfg = window.MOGU_MAP_CONFIG || {}, RADIUS_KM = 10, map, markers = [];
      var IN_WECHAT = /MicroMessenger/i.test(navigator.userAgent || "");
      function escapeHtml(s) { return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
      function haversineKm(a,b,c,d){var R=6371,x=(c-a)*Math.PI/180,y=(d-b)*Math.PI/180,z=Math.sin(x/2)**2+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(y/2)**2;return R*2*Math.atan2(Math.sqrt(z),Math.sqrt(1-z));}
      function setStatus(m,e){var el=document.getElementById("status");el.textContent=m;el.className=e?"error":"";}
      function renderList(items){var el=document.getElementById("deal-list");if(!items.length){el.innerHTML='<div class="empty">附近 '+RADIUS_KM+' 公里内暂无优惠</div>';return;}items.sort(function(a,b){return a.distance-b.distance;});el.innerHTML=items.map(function(d){return '<div class="deal-card"><div class="title">'+escapeHtml(d.title)+'</div><div class="meta"><span class="tag">'+escapeHtml(d.category)+'</span> <span class="dist">'+d.distance.toFixed(0)+' 米</span> · '+escapeHtml(d.poi_name)+'</div>'+(d.link?'<div style="margin-top:8px"><a href="'+escapeHtml(d.link)+'">查看详情 →</a></div>':'')+'</div>';}).join("");}
      function showOnMap(items,center){markers.forEach(function(m){map.remove(m);});markers=[];items.forEach(function(d){var m=new AMap.Marker({position:[d.lng,d.lat],label:{content:d.distance.toFixed(0)+"m",direction:"top"}});m.on("click",function(){new AMap.InfoWindow({content:'<div style="padding:8px"><b>'+escapeHtml(d.title)+'</b><br/>'+d.distance.toFixed(0)+'米</div>'}).open(map,[d.lng,d.lat]);});map.add(m);markers.push(m);});if(center){var c=new AMap.Circle({center:center,radius:RADIUS_KM*1000,strokeColor:"#1677ff",fillColor:"#1677ff",fillOpacity:0.08});map.add(c);markers.push(c);}if(items.length)map.setFitView(markers,false,[40,40,40,40]);}
      function run(data,pos){map=new AMap.Map("map",{zoom:14,center:pos});new AMap.Marker({position:pos,icon:"https://webapi.amap.com/theme/v1.3/markers/n/loc.png"}).setMap(map);var lat=pos[1],lng=pos[0],nearby=(data.deals||[]).map(function(d){return Object.assign({},d,{distance:haversineKm(lat,lng,d.lat,d.lng)*1000});}).filter(function(d){return d.distance<=RADIUS_KM*1000;});setStatus("显示 "+RADIUS_KM+" 公里内 "+nearby.length+" 条优惠");renderList(nearby);showOnMap(nearby,pos);}
      function load(cb){if(window.AMap)return cb();window._AMapSecurityConfig={securityJsCode:cfg.securityJsCode||""};var s=document.createElement("script");s.src="https://webapi.amap.com/maps?v=2.0&key="+encodeURIComponent(cfg.amapKey);s.onload=cb;document.head.appendChild(s);}
      fetch("deals_today.json?t="+Date.now()).then(function(r){return r.json();}).then(function(data){RADIUS_KM=data.radius_km||10;document.getElementById("subtitle").textContent=RADIUS_KM+" 公里内超市 · 商场 · 吃喝玩乐优惠";load(function(){if(navigator.geolocation){navigator.geolocation.getCurrentPosition(function(p){run(data,[p.coords.longitude,p.coords.latitude]);},function(){var c=data.center||{lng:117.184,lat:34.261};run(data,[c.lng,c.lat]);});}else{var c=data.center||{lng:117.184,lat:34.261};run(data,[c.lng,c.lat]);}});}).catch(function(e){setStatus("加载失败: "+e.message,true);});
    })();
  </script>
</body>
</html>
